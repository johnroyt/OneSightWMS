<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory - WMS</title>
    <link rel="stylesheet" href="../../css/styles.css">
    <style>
        .inventory-tabs {
            display: flex;
            border-bottom: 1px solid #e2e8f0;
            padding: 0 1.5rem;
            background: white;
        }

        .inventory-tab {
            padding: 1rem 1.5rem;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            font-weight: 500;
            color: #718096;
            font-family: Arial, sans-serif;
            font-size: 12px;
            white-space: nowrap;
            transition: color 0.15s ease, border-color 0.15s ease;
        }

        .inventory-tab:hover {
            color: #4a5568;
        }

        .inventory-tab.active {
            color: #3186ad;
            border-bottom-color: #3186ad;
        }

        .inventory-tab-content {
            display: none;
            padding: 1.5rem;
        }

        .inventory-tab-content.active {
            display: block;
        }

        /* Count Sessions table styling */
        .sessions-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.25rem;
        }

        .sessions-filter {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .sessions-filter label {
            font-size: 12px;
            color: #718096;
            font-weight: 500;
        }

        .sessions-filter select {
            padding: 0.375rem 0.75rem;
            border: 1px solid #e2e8f0;
            border-radius: 1px;
            font-size: 12px;
            color: #4a5568;
            background: white;
            cursor: pointer;
        }

        .sessions-filter select:focus {
            outline: none;
            border-color: #3186ad;
        }

        .start-session-btn {
            background: #3186ad;
            color: white;
            border: none;
            padding: 0.625rem 1.25rem;
            border-radius: 1px;
            font-weight: 500;
            font-family: 'Lato', Arial, sans-serif;
            text-transform: uppercase;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.15s ease;
        }

        .start-session-btn:hover {
            background: #474e53;
        }

        /* Inline sessions table (fallback / skeleton) */
        .sessions-table-wrapper {
            border: 1px solid #e2e8f0;
            border-radius: 1px;
            overflow: hidden;
        }

        .sessions-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .sessions-table thead tr {
            background: #f8fafc;
        }

        .sessions-table th {
            padding: 0.75rem 1rem;
            text-align: left;
            font-weight: 600;
            color: #4a5568;
            border-bottom: 1px solid #e2e8f0;
            white-space: nowrap;
        }

        .sessions-table td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #f2f2f2;
            color: #333;
            vertical-align: middle;
        }

        .sessions-table tr:last-child td {
            border-bottom: none;
        }

        .sessions-table tr:hover td {
            background: #f7fafc;
        }

        /* Status badges */
        .status-badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .status-open {
            background: #e6f1f8;
            color: #3186ad;
        }

        .status-in-progress {
            background: #fef3c7;
            color: #92400e;
        }

        .status-finalized {
            background: #d1fae5;
            color: #065f46;
        }

        /* Resume / View button */
        .resume-btn {
            background: #3186ad;
            color: white;
            border: none;
            padding: 0.3rem 0.875rem;
            border-radius: 1px;
            font-size: 11px;
            font-weight: 500;
            font-family: 'Lato', Arial, sans-serif;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.15s ease;
            text-decoration: none;
            display: inline-block;
        }

        .resume-btn:hover {
            background: #226080;
        }

        .resume-btn.view {
            background: #718096;
        }

        .resume-btn.view:hover {
            background: #4a5568;
        }

        /* Empty state */
        .sessions-empty {
            text-align: center;
            padding: 3rem 2rem;
            color: #718096;
        }

        .sessions-empty p {
            margin-bottom: 1rem;
        }

        /* Caspio container within a tab */
        .tab-datapage-container {
            min-height: 200px;
        }

        /* Info callout */
        .info-callout {
            background: #e6f1f8;
            border-left: 3px solid #3186ad;
            padding: 0.75rem 1rem;
            border-radius: 1px;
            font-size: 12px;
            color: #2c5f7a;
            margin-bottom: 1.25rem;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="sidebar-container"></div>

        <div class="main-wrapper">
            <div id="header-container"></div>

            <main class="main-content">
                <div class="full-width-section">

                    <!-- Tab Bar -->
                    <div class="inventory-tabs">
                        <div class="inventory-tab active" data-tab="stock-by-location">Stock by Location</div>
                        <div class="inventory-tab" data-tab="count-sessions">Count Sessions</div>
                    </div>

                    <!-- Tab: Stock by Location -->
                    <div id="tab-stock-by-location" class="inventory-tab-content active">
                        <div class="tab-datapage-container">
                            <script type="text/javascript" src="https://c2ect483.caspio.com/dp/9759400026a1609f48634555a3a1/emb"></script>
                        </div>
                    </div>

                    <!-- Tab: Count Sessions -->
                    <div id="tab-count-sessions" class="inventory-tab-content">

                        <div class="sessions-toolbar">

                            <button class="start-session-btn" onclick="openNewSessionModal()">
                                + Start New Count Session
                            </button>
                        </div>

                        <div class="info-callout">
                            Open sessions can be resumed at any time. Finalized sessions are read-only and reflect committed inventory adjustments.
                        </div>

                        <div id="count-sessions-datapage" class="tab-datapage-container">
                            <!-- Caspio DataPage loads here via loadCountSessionsDataPage() -->
                        </div>

                    </div><!-- /tab-count-sessions -->

                </div>
            </main>
        </div>
    </div>

    <!-- New Count Session Modal -->
    <div id="new-session-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="card-title">Start New Count Session</h2>
                <span class="close-modal" onclick="closeNewSessionModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div id="new-session-datapage" class="datapage-container">
                    <p>Loading...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="../../js/main.js"></script>
    <script>
        // Initialize sidebar and header (no floating button — Start Session lives in the tab)
        document.getElementById('sidebar-container').innerHTML = generateSidebar('Inventory');
        document.getElementById('header-container').innerHTML = generateHeader('Inventory Management');
        initializeNavigation();

        // ── Tab switching ──────────────────────────────────────────────────────────
        document.querySelectorAll('.inventory-tab').forEach(function(tab) {
            tab.addEventListener('click', function() {
                const target = this.getAttribute('data-tab');

                document.querySelectorAll('.inventory-tab').forEach(function(t) {
                    t.classList.remove('active');
                });
                document.querySelectorAll('.inventory-tab-content').forEach(function(c) {
                    c.classList.remove('active');
                });

                this.classList.add('active');
                document.getElementById('tab-' + target).classList.add('active');

                // Persist active tab in the URL hash so browser back/refresh works
                history.replaceState(null, '', '#' + target);

                // When Count Sessions tab is opened, load the DataPage
                if (target === 'count-sessions') {
                    loadCountSessionsDataPage();
                }
            });
        });

        // Restore tab from URL hash on load
        (function() {
            const hash = window.location.hash.replace('#', '');
            if (hash) {
                const matchingTab = document.querySelector('.inventory-tab[data-tab="' + hash + '"]');
                if (matchingTab) {
                    matchingTab.click();
                }
            }
        })();

        // ── Count Sessions DataPage loader ─────────────────────────────────────────
        // Replace the DataPage URL below with your actual Count Sessions report DataPage.
        // Pass the status filter value so Caspio can pre-filter the results.
        const COUNT_SESSIONS_DATAPAGE_URL = 'https://c2ect483.caspio.com/dp/97594000752158dd59d64c16afd0/emb';

        let countSessionsDpLoaded = false;

        function loadCountSessionsDataPage(forceReload) {
            if (countSessionsDpLoaded && !forceReload) return;

            const container = document.getElementById('count-sessions-datapage');

            container.innerHTML = '';
            const script = document.createElement('script');
            script.type = 'text/javascript';
            script.src = COUNT_SESSIONS_DATAPAGE_URL;
            container.appendChild(script);

            countSessionsDpLoaded = true;
        }

        // ── New Session Modal ──────────────────────────────────────────────────────
        function openNewSessionModal() {
            const modal = document.getElementById('new-session-modal');
            const container = document.getElementById('new-session-datapage');

            container.innerHTML = '';
            const script = document.createElement('script');
            script.type = 'text/javascript';
            script.src = 'https://c2ect483.caspio.com/dp/97594000850e4b9bace64a088644/emb';
            container.appendChild(script);

            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeNewSessionModal() {
            const modal = document.getElementById('new-session-modal');
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
            document.getElementById('new-session-datapage').innerHTML = '';

            // Refresh the sessions list so a newly created session appears
            countSessionsDpLoaded = false;
            loadCountSessionsDataPage();
        }

        window.addEventListener('click', function(e) {
            const modal = document.getElementById('new-session-modal');
            if (e.target === modal) closeNewSessionModal();
        });

        // ── Resume / View helper (callable from Caspio HTML blocks) ───────────────
        function resumeSession(sessionId, locationId, status) {
            if (status && status.toLowerCase() === 'finalized') {
                window.location.href = 'scanner.html?SessionID=' + sessionId + '&LocationID=' + encodeURIComponent(locationId) + '&readonly=1';
            } else {
                window.location.href = 'scanner.html?SessionID=' + sessionId + '&LocationID=' + encodeURIComponent(locationId);
            }
        }
    </script>
</body>
</html>
