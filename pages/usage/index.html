<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transactions - WMS</title>
    <link rel="stylesheet" href="../../css/styles.css">
</head>
<body>
    <div class="app-container">
        <div id="sidebar-container"></div>
        
        <div class="main-wrapper">
            <div id="header-container"></div>
            
            <main class="main-content">
                <div class="full-width-section">
                    <div class="card-header">
                        <h2 class="card-title">Transaction History</h2>
                        
                        <button class="create-po-btn modal-trigger" 
                                style="background: #38a169;" 
                                data-modal-title="Log New Transaction" 
                                data-modal-key="transactionCreate" 
                                data-modal-form-name="Transaction">
                            + Log Transaction
                        </button>
                    </div>
                    
                    <div class="datapage-container">
                        <script type="text/javascript" src="https://c2ect483.caspio.com/dp/9759400032dd1fff382448c2afed/emb"></script>
                    </div>
                </div>
            </main>
        </div>
    </div>
    
    <script src="../../js/main.js"></script>
    <script>
        // Initialize with the new "Transactions" branding
        document.getElementById('sidebar-container').innerHTML = generateSidebar('Transactions');
        document.getElementById('header-container').innerHTML = generateHeader('Inventory Transactions');
        initializeNavigation();
    </script>
</body>
</html>
