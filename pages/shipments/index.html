<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shipments - WMS</title>
    <link rel="stylesheet" href="../../css/styles.css">
</head>
<body>
<div class="app-container">
    <div id="sidebar-container"></div>
    <div class="main-wrapper">
        <div id="header-container"></div>
        <main class="main-content">
            <div class="full-width-section">

                <div class="inventory-tabs">
                    <div class="inventory-tab active" data-tab="receipt-log">Receipt Log</div>
                    <div class="inventory-tab" data-tab="outbound">Outbound Shipments</div>
                </div>

                <div id="tab-receipt-log" class="inventory-tab-content active">
                    <div class="tab-datapage-container" id="receipt-log-datapage">
                        <script type="text/javascript" src="https://c2ect483.caspio.com/dp/97594000283282e705bd4b318859/emb"></script>
                    </div>
                </div>

                <div id="tab-outbound" class="inventory-tab-content">
                    <div id="outbound-datapage" class="tab-datapage-container"></div>
                </div>

            </div>
        </main>
    </div>
</div>

<script src="../../js/main.js"></script>
<script>
window.addEventListener('DOMContentLoaded', () => {
    document.getElementById('sidebar-container').innerHTML = generateSidebar('Shipments');
    document.getElementById('header-container').innerHTML = generateHeader('Shipments');
    initializeNavigation();

    document.querySelectorAll('.inventory-tab').forEach(tab => {
        tab.addEventListener('click', function () {
            document.querySelectorAll('.inventory-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.inventory-tab-content').forEach(c => c.classList.remove('active'));
            this.classList.add('active');
            document.getElementById('tab-' + this.dataset.tab).classList.add('active');
            history.replaceState(null, '', '#' + this.dataset.tab);

            if (this.dataset.tab === 'outbound') loadOutbound();
        });
    });

    const hash = window.location.hash.replace('#', '');
    if (hash) {
        const t = document.querySelector(`.inventory-tab[data-tab="${hash}"]`);
        if (t) t.click();
    }
});

let outboundLoaded = false;
function loadOutbound() {
    if (outboundLoaded) return;
    outboundLoaded = true;
    const container = document.getElementById('outbound-datapage');
    const script = document.createElement('script');
    script.type = 'text/javascript';
    script.src = CASPIO_DATAPAGES.shipmentCreate;
    container.appendChild(script);
}
</script>
</body>
</html>
