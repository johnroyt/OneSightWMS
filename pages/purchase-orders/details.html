<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase Order Details - WMS</title>
    <link rel="stylesheet" href="../../css/styles.css">
</head>
<body>
    <div class="app-container">
        <div id="sidebar-container"></div>

        <div class="main-wrapper">
            <div id="header-container"></div>

            <main class="main-content multi-section">
                <!-- Top row: PO Details (left, flexible) + Receiving History (right, fixed) -->
                <div class="po-top-row">
                    <div class="full-width-section">
                        <div class="card-header">
                            <h2 class="card-title">Purchase Order Details</h2>
                            <div id="po-number" style="color: #4c6ef5; font-weight: 600;"></div>
                        </div>
                        <div id="po-details-container" class="datapage-container">
                            <p>Loading Purchase Order Details...</p>
                        </div>
                    </div>

                    <div class="full-width-section po-history-side">
                        <div class="card-header">
                            <h2 class="card-title">Receiving History</h2>
                        </div>
                        <div id="po-history-container" class="datapage-container">
                            <p>Loading Receiving History...</p>
                        </div>
                    </div>
                </div>

                <!-- Purchase Order Items: full width below -->
                <div class="full-width-section">
                    <div class="card-header">
                        <h2 class="card-title">Purchase Order Items</h2>
                    </div>
                    <div id="po-items-container" class="datapage-container">
                        <p>Loading Purchase Order Items...</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../js/main.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const purchaseOrderId = urlParams.get('PurchaseOrderID') || urlParams.get('OrderID');

        document.getElementById('sidebar-container').innerHTML = generateSidebar('Purchase Orders');

        const receiveBtnHtml = purchaseOrderId ?
            `<button class="create-po-btn modal-trigger"
                data-modal-title="Start Receiving Session"
                data-modal-key="poReceivingSessionCreate"
                style="background-color: #10b981;">+ Receive Items</button>` : '';

        document.getElementById('header-container').innerHTML = generateHeader('Purchase Order Details', receiveBtnHtml);
        initializeNavigation();
        initializeModalTriggers();

        window.addEventListener('message', function(e) {
            if (e.data && e.data.destinationLocationID) {
                const btn = document.querySelector('[data-modal-key="poReceivingSessionCreate"]');
                if (btn) {
                    btn.setAttribute('data-modal-params', JSON.stringify({ DestinationLocationID: e.data.destinationLocationID }));
                }
            }
        });

        if (purchaseOrderId) {
            const detailsContainer = document.getElementById('po-details-container');
            const detailsScript = document.createElement('script');
            detailsScript.src = `https://c2ect483.caspio.com/dp/97594000e98e324644c14ec3991f/emb?PurchaseOrderID=${purchaseOrderId}`;
            detailsContainer.innerHTML = '';
            detailsContainer.appendChild(detailsScript);

            const itemsContainer = document.getElementById('po-items-container');
            const itemsScript = document.createElement('script');
            itemsScript.src = `https://c2ect483.caspio.com/dp/9759400078819e1302ad47aa9c7f/emb?PurchaseOrderID=${purchaseOrderId}`;
            itemsContainer.innerHTML = '';
            itemsContainer.appendChild(itemsScript);

            const historyContainer = document.getElementById('po-history-container');
            const historyScript = document.createElement('script');
            historyScript.src = `https://c2ect483.caspio.com/dp/9759400005c63bb9d87943a4b827/emb?PurchaseOrderID=${purchaseOrderId}`;
            historyContainer.innerHTML = '';
            historyContainer.appendChild(historyScript);
        } else {
            document.getElementById('po-details-container').innerHTML = '<p style="color: #e53e3e;">Error: No Purchase Order ID provided.</p>';
            document.getElementById('po-items-container').innerHTML = '<p style="color: #e53e3e;">Error: No Purchase Order ID provided.</p>';
            document.getElementById('po-history-container').innerHTML = '<p style="color: #e53e3e;">Error: No Purchase Order ID provided.</p>';
        }
    </script>

</body>
</html>
